version: '3.8'

services:
  # Development database
  mongodb-dev:
    image: mongo:6
    container_name: hospital-mongodb-dev
    environment:
      MONGO_INITDB_DATABASE: hospital-queue-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db

  # Development redis
  redis-dev:
    image: redis:7-alpine
    container_name: hospital-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  mongodb_dev_data:
  redis_dev_data:
